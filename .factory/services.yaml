commands:
  install: cd /Users/ashishhuddar/scopepm && bun install
  test:api: cd /Users/ashishhuddar/scopepm/packages/api && bun run test
  test:web: cd /Users/ashishhuddar/scopepm/packages/web && bun run test
  test: cd /Users/ashishhuddar/scopepm/packages/api && bun run test && cd /Users/ashishhuddar/scopepm/packages/web && bun run test
  build: cd /Users/ashishhuddar/scopepm && bun run build

services:
  api:
    start: cd /Users/ashishhuddar/scopepm/packages/api && PORT=3001 bun run --watch src/index.ts &
    stop: lsof -ti :3001 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3001/
    port: 3001
    depends_on: []

  web:
    start: cd /Users/ashishhuddar/scopepm/packages/web && bun run dev &
    stop: lsof -ti :3000 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3000/
    port: 3000
    depends_on: [api]
