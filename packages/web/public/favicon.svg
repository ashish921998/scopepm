<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#C4553A"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" stroke="white" stroke-width="1.75" fill="none"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="5" stroke="white" stroke-width="1.75" fill="none"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="white"/>
  <!-- Crosshair: top -->
  <line x1="16" y1="5" x2="16" y2="11" stroke="white" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Crosshair: bottom -->
  <line x1="16" y1="21" x2="16" y2="27" stroke="white" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Crosshair: left -->
  <line x1="5" y1="16" x2="11" y2="16" stroke="white" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Crosshair: right -->
  <line x1="21" y1="16" x2="27" y2="16" stroke="white" stroke-width="1.75" stroke-linecap="round"/>
</svg>
